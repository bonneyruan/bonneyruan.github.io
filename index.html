<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonney Ruan</title>
  <meta name="description" content="A simple index of Bonney Ruan's active work and current projects.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #fffefb;
      --ink: #22211f;
      --muted: #5a5a5a;
      --rule: rgba(87, 136, 255, 0.28);
      --margin: rgba(226, 74, 74, 0.45);
      --row: 48px;
      --header-space: 168px;
      --gutter: 26px;
      --page-edge: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      position: relative;
      margin: 0;
      min-height: 100vh;
      background-color: var(--paper);
      background-image:
        linear-gradient(var(--paper), var(--paper)),
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent calc(var(--row) - 1px),
          var(--rule) calc(var(--row) - 1px),
          var(--rule) var(--row)
        );
      background-repeat: no-repeat, repeat-y;
      background-size: 100% var(--header-space), 100% calc(100% - var(--header-space));
      background-position: 0 0, 0 var(--header-space);
      color: var(--ink);
      font: 16px/1.5 "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      bottom: 0;
      left: max(var(--page-edge), calc(50vw - 320px));
      width: 2px;
      background: var(--margin);
      pointer-events: none;
    }

    main {
      width: min(100%, 640px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 0 20px 0 calc(var(--gutter) + 2px);
      display: flex;
      flex-direction: column;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 500;
      line-height: 1.05;
    }

    .header {
      height: calc(var(--header-space) + var(--row));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 20px;
      margin-bottom: calc(-1 * var(--row));
    }

    .intro {
      margin-top: 6px;
      color: var(--muted);
    }

    ul {
      list-style: none;
      margin: var(--row) 0 0;
      padding: 0;
    }

    a,
    .plain-item {
      display: flex;
      gap: 16px;
      justify-content: space-between;
      align-items: center;
      height: var(--row);
      color: inherit;
      text-decoration: none;
    }

    a:hover,
    a:focus-visible {
      color: var(--ink);
      outline: none;
    }

    a:hover .label,
    a:focus-visible .label {
      text-decoration: underline;
      text-decoration-color: var(--ink);
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
    }

    .label {
      font-size: 1.08rem;
    }

    .left {
      display: flex;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    .item-copy {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      width: 100%;
    }

    .mark {
      flex: 0 0 auto;
      width: 1rem;
      color: var(--ink);
      font-size: 0.9rem;
      line-height: 1;
    }
    .note {
      flex: 0 0 auto;
      color: #6a6966;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .asterisk-note {
      display: flex;
      align-items: center;
      color: var(--muted);
      font-size: 0.95rem;
      height: var(--row);
      line-height: 1.35;
    }

    .spacer {
      flex: 1 1 auto;
    }

    .bottom-band {
      height: var(--row);
      flex: 0 0 auto;
    }

    @media (max-width: 560px) {
      :root {
        --gutter: 28px;
        --page-edge: calc(50vw - 146px);
        --row: 64px;
        --header-space: 184px;
      }

      a,
      .plain-item {
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 2px;
      }

      main {
        width: min(100%, 300px);
        padding: 0 16px 0 calc(var(--gutter) + 2px);
      }

      .left {
        gap: 8px;
        width: 100%;
      }

      .item-copy {
        display: flex;
        flex-direction: column;
        justify-content: center;
        width: 100%;
        height: 100%;
        gap: 2px;
      }

      ul {
        margin-top: var(--row);
      }

      .note {
        display: block;
        margin-left: calc(1rem + 8px);
        white-space: normal;
        width: calc(100% - (1rem + 8px));
        text-align: left;
      }

      .header {
        height: calc(var(--header-space) + var(--row));
        width: 100%;
        padding-bottom: 20px;
        margin-bottom: calc(-1 * var(--row));
      }

      h1 {
        font-size: 1.8rem;
        line-height: 1.1;
      }

      .label {
        font-size: 0.98rem;
      }

      .note,
      .intro,
      .asterisk-note {
        font-size: 0.9rem;
      }

      .intro,
      a,
      .plain-item {
        height: var(--row);
        line-height: 1.35;
        padding: 0;
      }

      .asterisk-note {
        align-items: flex-start;
        padding-top: 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="header">
      <h1>bonney ruan *</h1>
    </div>

    <ul aria-label="work list">
      <li>
        <a href="https://cafebonney.com" target="_blank" rel="noopener noreferrer">
          <span class="item-copy">
            <span class="left">
              <span class="mark" aria-hidden="true">●</span>
              <span class="label">Cafe Bonney</span>
            </span>
            <span class="note">whimsical home goods</span>
          </span>
        </a>
      </li>
      <li>
        <a href="millends.html">
          <span class="item-copy">
            <span class="left">
              <span class="mark" aria-hidden="true">●</span>
              <span class="label">Mill Ends Park</span>
            </span>
            <span class="note">world's smallest website</span>
          </span>
        </a>
      </li>
      <li>
        <a href="weatherwindow.html">
          <span class="item-copy">
            <span class="left">
              <span class="mark" aria-hidden="true">○</span>
              <span class="label">Weather Window</span>
            </span>
            <span class="note">ascii weather visualizer</span>
          </span>
        </a>
      </li>
      <li>
        <a href="https://slam.co" target="_blank" rel="noopener noreferrer">
          <span class="item-copy">
            <span class="left">
              <span class="mark" aria-hidden="true">○</span>
              <span class="label">Design at SLAM&amp;CO</span>
            </span>
            <span class="note">products</span>
          </span>
        </a>
      </li>
    </ul>

    <div class="spacer" aria-hidden="true"></div>
    <p class="asterisk-note">* i make stuff and lists</p>
    <div class="bottom-band" aria-hidden="true"></div>
  </main>
</body>
</html>
